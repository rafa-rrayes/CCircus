# PR admission: everything INDEX_FORMAT.md §7 promises, split into a
# toolchain-free index job and a full build+test verify job.
name: PR

on:
  pull_request:

jobs:
  index:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Index matches the manifests (byte-exact)
        run: python tools/cc.py gen-index --check
      - name: Archives are append-only
        run: |
          git fetch --no-tags origin "${{ github.base_ref }}"
          # --no-renames: a rename would otherwise register as R (not M/D)
          # and slip past the filter, deleting a published archive
          touched=$(git diff --no-renames --diff-filter=MD --name-only "origin/${{ github.base_ref }}...HEAD" -- archives/)
          if [ -n "$touched" ]; then
            echo "published archives were modified or deleted (they are immutable):"
            echo "$touched"
            exit 1
          fi
      - name: Archive size cap (1 MB)
        run: |
          big=$(find archives -name '*.tar.gz' -size +1M || true)
          if [ -n "$big" ]; then
            echo "archives exceed the 1 MB cap:"
            echo "$big"
            exit 1
          fi

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      # Verify against what consumers get: the released toolchain from PyPI.
      - name: Build + test every package
        run: >
          uv run --no-project --python 3.14
          --with 'pyshdl>=1.1.0'
          python tools/cc.py all
